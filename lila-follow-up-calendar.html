.cal-nav button{width:32px;height:32px;border-radius:8px;border:1px solid #d2d2d7;background:#fff;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:#f5f5f7}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e8e8ed;border-radius:8px;overflow:hidden}
.cal-day-header{background:#f5f5f7;padding:8px 4px;text-align:center;font-size:11px;font-weight:600;color:#86868b;text-transform:uppercase}
.cal-day{background:#fff;min-height:90px;padding:6px;position:relative;cursor:pointer}
.cal-day:hover{background:#f5f5f7}
.cal-day.other-month{background:#fafafa}
.cal-day.other-month .day-num{color:#c7c7cc}
.cal-day.today{background:#e8f4fd}
.cal-day .day-num{font-size:12px;font-weight:600;margin-bottom:4px}
.cal-day.today .day-num{color:#0071e3;font-weight:700}
.cal-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin:1px}
.dot-fu1-overdue{background:#951B1E}
.dot-fu1-due{background:#ff9f0a}
.dot-fu2-overdue{background:#951B1E}
.dot-fu2-due{background:#bf5af2}
.dot-fu1-done{background:#30d158}
.dot-fu2-done{background:#30d158}
.cal-event{font-size:9px;line-height:1.3;padding:2px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer}
.cal-event.fu1{background:#fff3e0;color:#e65100;border-left:2px solid #ff9f0a}
.cal-event.fu2{background:#f3e5f5;color:#7b1fa2;border-left:2px solid #bf5af2}
.cal-event.overdue{background:#fce4ec;color:#951B1E;border-left:2px solid #951B1E}
.cal-event.done{background:#e8f5e9;color:#2e7d32;border-left:2px solid #30d158;opacity:0.6}
.cal-event.onboard{background:#e3f2fd;color:#0071e3;border-left:2px solid #0071e3}
.cal-event.connect{background:#e8f5e9;color:#2e7d32;border-left:2px solid #30d158}

function addDays(d,n){const r=new Date(d);r.setDate(r.getDate()+n);return r;}
function fmtDate(d){return d.toISOString().slice(0,10);}
function parseD(s){const p=s.split("-");return new Date(+p[0],+p[1]-1,+p[2]);}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function daysBetween(a,b){return Math.round((b-a)/86400000);}
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAYS=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

function initCustomers(){
  try{const saved=localStorage.getItem(KEY);if(saved)return JSON.parse(saved);}catch(e){}
  return RAW_CUSTOMERS.map((c,i)=>({
    ...c,id:i,
    hhSize:c.hhSize||"1-2",
    connectStatus:c._connect||"pending",
    fu1Status:c._fu1||"pending",
    fu2Status:c._fu2||"pending",
    notes:c._notes||"",
    phone:c.phone||"",
  }));
}

function calcFollowUps(c){
  const ob=parseD(c.onboard);
  const days1=c.hhSize==="3-5"?7:14;
  const days2=c.hhSize==="3-5"?14:28;
  return{fu1Date:addDays(ob,days1),fu2Date:addDays(ob,days2)};
}

function App(){
  const[customers,setCustomers]=useState(initCustomers);
  const[view,setView]=useState("calendar");
  const[calMonth,setCalMonth]=useState(TODAY.getMonth());
  const[calYear,setCalYear]=useState(TODAY.getFullYear());
  const[search,setSearch]=useState("");
  const[filter,setFilter]=useState("all");
  const[selected,setSelected]=useState(null);
  const[dayDetail,setDayDetail]=useState(null);

  useEffect(()=>{try{localStorage.setItem(KEY,JSON.stringify(customers));}catch(e){}},[customers]);

  const updateCustomer=useCallback((id,patch)=>{
    setCustomers(prev=>prev.map(c=>c.id===id?{...c,...patch}:c));
  },[]);

  /* ── Computed follow-ups ── */
  const enriched=useMemo(()=>customers.map(c=>{
    const{fu1Date,fu2Date}=calcFollowUps(c);
    const connectDone=(c.connectStatus||"pending")!=="pending";
    const fu1Overdue=c.fu1Status==="pending"&&fu1Date<TODAY;
    const fu2Overdue=c.fu2Status==="pending"&&fu2Date<TODAY;
    const fu1DueToday=isSameDay(fu1Date,TODAY)&&c.fu1Status==="pending";
    const fu2DueToday=isSameDay(fu2Date,TODAY)&&c.fu2Status==="pending";
    const tickets=TICKET_MAP[c.email]||[];
    const hasIssue=tickets.length>0;
    const replacements=REPLACEMENT_MAP[c.email]||[];
    const hasReplacement=replacements.length>0;
    const returns=RETURN_MAP[c.email]||[];
    const hasReturn=returns.length>0||c.flagReturn;
    return{...c,connectDone,fu1Date,fu2Date,fu1Overdue,fu2Overdue,fu1DueToday,fu2DueToday,tickets,hasIssue,replacements,hasReplacement,returns,hasReturn};
  }),[customers]);

  /* ── Stats ── */
  const stats=useMemo(()=>{
    let overdue=0,dueToday=0,upcoming=0,done=0,issues=0,replacePending=0,returnCount=0;
    enriched.forEach(c=>{
      if(c.fu1Overdue)overdue++;
      if(c.fu2Overdue)overdue++;
      if(c.fu1DueToday)dueToday++;
      if(c.fu2DueToday)dueToday++;
      if(c.fu1Status==="pending"&&!c.fu1Overdue&&!c.fu1DueToday&&c.fu1Date>TODAY)upcoming++;
      if(c.fu2Status==="pending"&&!c.fu2Overdue&&!c.fu2DueToday&&c.fu2Date>TODAY)upcoming++;
      if(c.fu1Status==="completed"||c.fu1Status==="review"||c.fu1Status==="reviewed")done++;
      if(c.fu2Status==="completed"||c.fu2Status==="review"||c.fu2Status==="reviewed")done++;
      if(c.hasIssue)issues++;
      if(c.hasReplacement)replacePending++;
      if(c.hasReturn)returnCount++;
    });
    return{overdue,dueToday,upcoming,done,issues,replacePending,returnCount,total:enriched.length};
  },[enriched]);

  /* ── Filtered list ── */
  const filtered=useMemo(()=>{
    let list=enriched;
    if(search){
      const q=search.toLowerCase();
      list=list.filter(c=>c.name.toLowerCase().includes(q)||c.email.toLowerCase().includes(q));
    }
    if(filter==="overdue")list=list.filter(c=>c.fu1Overdue||c.fu2Overdue);
    else if(filter==="today")list=list.filter(c=>c.fu1DueToday||c.fu2DueToday);
    else if(filter==="upcoming")list=list.filter(c=>!c.fu1Overdue&&!c.fu2Overdue&&(c.fu1Status==="pending"||c.fu2Status==="pending"));
    else if(filter==="done")list=list.filter(c=>(c.fu1Status==="completed"||c.fu1Status==="review"||c.fu1Status==="reviewed")&&(c.fu2Status==="completed"||c.fu2Status==="review"||c.fu2Status==="reviewed"));
    else if(filter==="return")list=list.filter(c=>c.hasReturn);
    else if(filter==="issues")list=list.filter(c=>c.hasIssue);
    else if(filter==="replace")list=list.filter(c=>c.hasReplacement);
    return list;
  },[enriched,search,filter]);

  /* ── Calendar helpers ── */
  const calDays=useMemo(()=>{
    const first=new Date(calYear,calMonth,1);
    const startDay=first.getDay();
    const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
    const prevMonthDays=new Date(calYear,calMonth,0).getDate();
    const cells=[];
    for(let i=startDay-1;i>=0;i--)cells.push({day:prevMonthDays-i,month:calMonth-1,other:true});
    for(let i=1;i<=daysInMonth;i++)cells.push({day:i,month:calMonth,other:false});
    const rem=42-cells.length;
    for(let i=1;i<=rem;i++)cells.push({day:i,month:calMonth+1,other:true});
    return cells;
  },[calMonth,calYear]);

  function getEventsForDay(day,month){

      if(isSameDay(c.fu1Date,d))events.push({type:"fu1",status:c.fu1Status,customer:c,overdue:c.fu1Overdue});
      if(isSameDay(c.fu2Date,d))events.push({type:"fu2",status:c.fu2Status,customer:c,overdue:c.fu2Overdue});
    });

          {c.returns&&c.returns.length>0&&(

              <div style={{fontSize:12,fontWeight:700,color:"#951B1E",marginBottom:4}}>📦 RETURN/REFUND ({c.returns.length})</div>

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div className="ret-item">{r.item}</div>
                    <span className={`ret-${r.status}`}>{r.status==="form-filed"?"form filed":r.status}</span>
                  </div>
                  {r.serial&&<div className="ret-meta">Serial: {r.serial}</div>}
                  {r.tracking&&<div className="ret-meta">Tracking: {r.tracking} ({r.carrier})</div>}
                  {r.price&&<div className="ret-meta">Return shipping: ${r.price.toFixed(2)}</div>}
                  {r.update&&<div className="ret-meta">{r.update}</div>}
                  {!r.tracking&&r.status==="form-filed"&&<div className="ret-meta" style={{color:"#e65100"}}>Awaiting return label / shipment</div>}
                </div>
              ))}
            </div>
          )}
          {c.tickets&&c.tickets.length>0&&(
            <div className="issue-panel">
              <div style={{fontSize:12,fontWeight:700,color:"#e65100",marginBottom:4}}>⚠ OPEN ISSUES ({c.tickets.length})</div>
              <div style={{fontSize:11,color:"#86868b",marginBottom:6}}>Resolve issues before proceeding with follow-ups</div>
              {c.tickets.map((t,ti)=>(
                <div key={ti} className="issue-card">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span className="ic-id">{t.ref}</span>
                    <span className={`issue-stage ${STAGE_CSS[t.stage]||""}`}>{STAGE_LABELS[t.stage]||"Unknown"}</span>
                  </div>
                  <div className="ic-subj">{t.subject}</div>
                  <div className="ic-meta">
                    Priority: <strong>{t.priority}</strong>
                    {" · "}
                    <a href={HS_URL+t.id} target="_blank" rel="noopener" style={{color:"#0071e3",fontSize:11}}>Open in HubSpot →</a>
                  </div>
                </div>
              ))}
            </div>
          )}
          {c.replacements&&c.replacements.length>0&&(
            <div className="replace-panel">
              <div style={{fontSize:12,fontWeight:700,color:"#5856d6",marginBottom:4}}>🔧 REPLACEMENTS ({c.replacements.length})</div>
              <div style={{fontSize:11,color:"#86868b",marginBottom:6}}>Tracking replacement parts for this customer</div>
              {c.replacements.map((r,ri)=>(
                <div key={ri} className="replace-card">
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <div className="rc-item">{r.item}</div>
                    <span className={`rs-${r.status}`}>{r.status}</span>
                  </div>
                  {r.tracking&&<div className="rc-meta">Tracking: {r.tracking} ({r.carrier})</div>}
                  {r.shipDate&&<div className="rc-meta">Shipped: {r.shipDate}</div>}
                  {r.update&&<div className="rc-meta">{r.update}</div>}
                  {!r.tracking&&<div className="rc-meta" style={{color:"#e65100"}}>No tracking yet — pending shipment</div>}
                </div>
              ))}
            </div>
          )}
          <div className="form-group">
            <label>Household Size</label>
            <select value={c.hhSize} onChange={e=>updateCustomer(c.id,{hhSize:e.target.value})}>
              <option value="1-2">1–2 members (2-week cycle)</option>
              <option value="3-5">3–5 members (1-week cycle)</option>
            </select>
          </div>
          <div className="form-group">
            <label>Onboarding Date</label>
            <input type="date" value={c.onboard} onChange={e=>updateCustomer(c.id,{onboard:e.target.value})}/>
          </div>
          <div className="fu-row fu1-row">
            <div className="fu-label" style={{color:"#e65100"}}>Follow-Up 1 — First Left Chamber Cycle Complete</div>
            <div className="fu-date">{fu1Date.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
            <div style={{fontSize:11,color:"#86868b"}}>Message on Quo first, then call if no response</div>
            <div style={{margin:"8px 0",padding:"8px 12px",background:"#fff",borderRadius:8,border:"1px solid #c8e6c9",fontSize:12,lineHeight:1.6}}>
              <div style={{fontWeight:700,color:"#2e7d32",marginBottom:6}}>📶 CONNECT TO DASHBOARD</div>
              <div style={{fontSize:11,color:"#86868b",marginBottom:4}}>During FU1 call, walk customer through connecting their LILA to our backend dashboard:</div>
              <div><strong>1.</strong> Ensure power is on — light should be <strong>Solid Green</strong></div>
              <div><strong>2.</strong> On phone WiFi → connect to <strong>"LL01-[Serial#]"</strong> → password <strong>"12345678"</strong> → "Connect without Internet"</div>
              <div><strong>3.</strong> Open browser → go to <strong>192.168.4.1</strong></div>
              <div><strong>4.</strong> Enter home WiFi name in SSID + password → click <strong>Connect</strong></div>
              <div style={{marginTop:6,fontSize:11,color:"#86868b"}}>After connect: wait for STA state "Connected" → click "Start Update" → wait 30-35 min for green light → power cycle</div>
              <div style={{marginTop:6}}>
                <select className="status-select" value={c.connectStatus||"pending"} onChange={e=>updateCustomer(c.id,{connectStatus:e.target.value})} style={{fontSize:11}}>
                  <option value="pending">⬜ Not Connected</option>
                  <option value="sent">📤 Instructions Sent</option>
                  <option value="connected">✅ Connected + OTA Done</option>
                </select>
              </div>
            </div>
            <div className="fu-status">
              <select className="status-select" value={c.fu1Status} onChange={e=>updateCustomer(c.id,{fu1Status:e.target.value})}>
                <option value="pending">Pending</option>
                <option value="messaged">Messaged on Quo</option>
                <option value="called">Called on Quo</option>
                <option value="completed">Completed</option>
              </select>
            </div>
          </div>
          <div className="fu-row fu2-row">
            <div className="fu-label" style={{color:"#7b1fa2"}}>Follow-Up 2 — 1st Mature Compost Ready</div>
            <div className="fu-date">{fu2Date.toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"})}</div>
            <div style={{fontSize:11,color:"#86868b"}}>If compost is good → ask for 5★ Trustpilot review + brand ambassador invite</div>
            <div style={{margin:"8px 0",padding:"8px 12px",background:"#fff",borderRadius:8,border:"1px solid #d2d2d7"}}>
              <div style={{fontSize:11,fontWeight:700,color:"#00b67a",marginBottom:4}}>★ TRUSTPILOT REVIEW LINK</div>
              <a href="https://www.trustpilot.com/review/lilacomposter.com" target="_blank" rel="noopener" style={{fontSize:12,color:"#0071e3",wordBreak:"break-all"}}>trustpilot.com/review/lilacomposter.com</a>
              <div style={{fontSize:10,color:"#86868b",marginTop:2}}>Send this link to customer when compost is good. Mark "Reviewed on Trustpilot" once submitted.</div>
            </div>
            <div className="fu-status">
              <select className="status-select" value={c.fu2Status} onChange={e=>updateCustomer(c.id,{fu2Status:e.target.value})}>
                <option value="pending">Pending</option>
                <option value="messaged">Messaged on Quo</option>
                <option value="called">Called on Quo</option>
                <option value="review">5★ Review Requested</option>
                <option value="reviewed">✓ Reviewed on Trustpilot</option>
              </select>
            </div>
          </div>
          <div className="form-group" style={{marginTop:12}}>
            <label>Notes</label>
            <textarea style={{width:"100%",padding:8,borderRadius:8,border:"1px solid #d2d2d7",fontSize:13,minHeight:60,resize:"vertical"}} value={c.notes||""} onChange={e=>updateCustomer(c.id,{notes:e.target.value})} placeholder="Add notes about this customer..."/>
          </div>
        </div>
      </div>
    );
  }

  /* ── Day detail popup ── */
  function DayPopup({day,month,onClose}){
    const events=getEventsForDay(day,month);
    const d=new Date(calYear,month,day);
    if(!events.length)return null;
    return(
      <div className="modal-overlay" onClick={onClose}>
        <div className="modal" onClick={e=>e.stopPropagation()} style={{position:"relative",width:420}}>
          <button className="modal-close" onClick={onClose}>&times;</button>
          <h3>{d.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</h3>
          <p style={{fontSize:12,color:"#86868b",marginBottom:16}}>{events.length} follow-up{events.length>1?"s":""} scheduled</p>
          {events.map((ev,i)=>{
            const colors={onboard:{bg:"#e3f2fd",label:"#0071e3"},connect:{bg:"#e8f5e9",label:"#2e7d32"},fu1:{bg:"#fff3e0",label:"#e65100"},fu2:{bg:"#f3e5f5",label:"#7b1fa2"}};
            const labels={onboard:"Onboarding Session",connect:"📶 Send Connect Instructions",fu1:"FU1 — Chamber Switch",fu2:"FU2 — Compost Ready"};
            const c=colors[ev.type]||colors.fu1;
            return(
            <div key={i} style={{padding:12,borderRadius:8,marginBottom:8,background:c.bg,cursor:"pointer"}} onClick={()=>{onClose();setSelected(ev.customer);}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <div>
                  <div className="fu-label" style={{color:c.label}}>{labels[ev.type]}</div>
                  <div style={{fontWeight:600,fontSize:14}}>{ev.customer.name}</div>
                  <div style={{fontSize:11,color:"#86868b"}}>{ev.customer.email}{ev.customer.phone&&<span style={{marginLeft:6,color:"#bf5af2"}}>{ev.customer.phone}</span>}</div>
                  {ev.customer.hasIssue&&<div style={{fontSize:10,color:"#e65100",fontWeight:600,marginTop:2}}>⚠ {ev.customer.tickets.length} open issue{ev.customer.tickets.length>1?"s":""}: {ev.customer.tickets.map(t=>t.ref).join(", ")}</div>}
                </div>
                {ev.type!=="onboard"&&ev.type!=="connect"&&<StatusBadge status={ev.status} overdue={ev.overdue}/>}
                {ev.type==="connect"&&<span className={`status-badge ${ev.status==="connected"?"sb-completed":ev.status==="sent"?"sb-messaged":ev.overdue?"sb-overdue":"sb-pending"}`}>{ev.status==="connected"?"Connected":ev.status==="sent"?"Sent":"Pending"}</span>}
                {ev.type==="onboard"&&<span className="status-badge sb-completed">Onboarded</span>}
              </div>
            </div>
            );
          })}
        </div>
      </div>
    );
  }

  return(
    <div className="app">
      <div className="header">
        <div><h1 style={{marginBottom:2}}><span>LILA</span> Customer Follow-Up Calendar</h1><div style={{fontSize:11,color:"#86868b"}}>Sources: Calendly · Gmail · Fireflies · Quo · HubSpot · Ashwini's FU Sheet · Replacement Sheet · Return&Refund Sheet · Gmail/Quo Scan (May 26)</div></div>
        <div className="header-right">
          <span style={{fontSize:13,color:"#86868b"}}>{TODAY.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"})}</span>
          <button className="today-btn" onClick={goToday}>Today</button>
        </div>
      </div>

      <div className="stats-row">
        <div className="stat-card stat-overdue"><div className="num">{stats.overdue}</div><div className="label">Overdue</div></div>
        <div className="stat-card stat-today"><div className="num">{stats.dueToday}</div><div className="label">Due Today</div></div>
        <div className="stat-card stat-upcoming"><div className="num">{stats.upcoming}</div><div className="label">Upcoming</div></div>
        <div className="stat-card stat-done"><div className="num">{stats.done}</div><div className="label">Completed</div></div>
        <div className="stat-card stat-issues"><div className="num">{stats.issues}</div><div className="label">Open Issues</div></div>
        <div className="stat-card stat-replace"><div className="num">{stats.replacePending}</div><div className="label">Replacements</div></div>
        <div className="stat-card stat-return"><div className="num">{stats.returnCount}</div><div className="label">Returns</div></div>
        <div className="stat-card stat-total"><div className="num">{stats.total}</div><div className="label">Customers</div></div>
      </div>

      <div className="tabs">
        <button className={`tab ${view==="calendar"?"active":""}`} onClick={()=>setView("calendar")}>Calendar</button>
        <button className={`tab ${view==="list"?"active":""}`} onClick={()=>setView("list")}>Full List</button>
      </div>

      {view==="calendar"?(
        <div className="view-container">
          <div className="calendar-panel">
            <div className="legend">
              <div className="legend-item"><div className="legend-dot" style={{background:"#0071e3"}}/> Onboarding</div>
              <div className="legend-item"><div className="legend-dot" style={{background:"#ff9f0a"}}/> FU1 — Chamber Switch</div>
              <div className="legend-item"><div className="legend-dot" style={{background:"#bf5af2"}}/> FU2 — Compost Ready</div>
              <div className="legend-item"><div className="legend-dot" style={{background:"#e65100"}}/> Has Issue</div>
              <div className="legend-item"><div className="legend-dot" style={{background:"#951B1E"}}/> Overdue</div>
              <div className="legend-item"><div className="legend-dot" style={{background:"#30d158"}}/> Done</div>
            </div>
            <div className="cal-header">
              <h2>{MONTHS[calMonth]} {calYear}</h2>
              <div className="cal-nav">
                <button onClick={prevMonth}>‹</button>
                <button onClick={nextMonth}>›</button>
              </div>
            </div>
            <div className="cal-grid">
              {DAYS.map(d=><div key={d} className="cal-day-header">{d}</div>)}
              {calDays.map((cell,i)=>{
                const events=getEventsForDay(cell.day,cell.month);
                const isToday=!cell.other&&isSameDay(new Date(calYear,cell.month,cell.day),TODAY);
                return(
                  <div key={i} className={`cal-day ${cell.other?"other-month":""} ${isToday?"today":""}`} onClick={()=>{if(events.length)setDayDetail(cell);}}>
                    <div className="day-num">{cell.day}</div>
                    {events.slice(0,3).map((ev,j)=>{
                      const done=ev.type!=="onboard"&&(ev.status==="completed"||ev.status==="review"||ev.status==="reviewed");
                      const cls=ev.type==="onboard"?"onboard":done?"done":ev.overdue?"overdue":ev.type==="fu1"?"fu1":"fu2";
                      const icon=ev.type==="onboard"?"📋":ev.type==="fu1"?"🔄":"🌱";
                      const issueCls=ev.customer.hasIssue?" has-issue":"";
                      return <div key={j} className={`cal-event ${cls}${issueCls}`}>{icon}{ev.customer.hasIssue?"⚠":""} {ev.customer.name.split(" ")[0]}</div>;
                    })}
                    {events.length>3&&<div style={{fontSize:9,color:"#86868b",textAlign:"center"}}>+{events.length-3} more</div>}
                  </div>
                );
              })}
            </div>
          </div>

          <div className="side-panel">
            <div className="list-panel">
              <h3>Customers</h3>
              <input className="search-box" placeholder="Search by name or email..." value={search} onChange={e=>setSearch(e.target.value)}/>
              <div className="filter-row">
                {[["all","All"],["overdue","Overdue"],["today","Today"],["upcoming","Upcoming"],["done","Done"],["issues","Issues"],["replace","Replacements"],["return","Returns"]].map(([k,l])=>(
                  <button key={k} className={`filter-btn ${filter===k?"active":""}`} onClick={()=>setFilter(k)}>{l}</button>
                ))}
              </div>
              <div className="customer-list">
                {filtered.map(c=>(
                  <div key={c.id} className={`customer-card ${selected&&selected.id===c.id?"selected":""}`} onClick={()=>setSelected(c)}>
                    <div className="cc-name">{c.name}</div>
                    <div className="cc-email">{c.email}{c.phone&&<span style={{marginLeft:6,color:"#bf5af2",fontSize:10,fontWeight:600}}>Quo ✓</span>}</div>
                    <div className="cc-date">Onboarded: {parseD(c.onboard).toLocaleDateString("en-US",{month:"short",day:"numeric"})}&ensp;·&ensp;HH: {c.hhSize}</div>
                    <div className="cc-badges">
                      {c.hasIssue&&<span className="badge badge-issue">⚠ {c.tickets.length} Issue{c.tickets.length>1?"s":""}</span>}
                      {c.hasReplacement&&<span className="badge badge-replace">🔧 Replacement</span>}
                      {c.hasReturn&&<span className="badge badge-return">📦 Return{c.returns.length>0?` (${c.returns.length})`:""}</span>}
                      {c.fu1Overdue&&<span className="badge badge-overdue">FU1 Overdue</span>}
                      {c.fu2Overdue&&<span className="badge badge-overdue">FU2 Overdue</span>}
                      {c.fu1DueToday&&<span className="badge badge-due-today">FU1 Today</span>}
                      {c.fu2DueToday&&<span className="badge badge-due-today">FU2 Today</span>}
                      {c.fu1Status==="completed"&&<span className="badge badge-done">FU1 ✓</span>}
                      {c.fu2Status==="completed"&&<span className="badge badge-done">FU2 ✓</span>}
                      {c.fu2Status==="review"&&<span className="badge badge-done">Review ✓</span>}
                      {c.fu2Status==="reviewed"&&<span className="badge badge-done">Trustpilot ★</span>}
                      {c.future&&<span className="badge badge-upcoming">Upcoming</span>}
                    </div>
                  </div>
                ))}
                {filtered.length===0&&<div style={{textAlign:"center",padding:20,color:"#86868b",fontSize:13}}>No customers match</div>}
              </div>
            </div>
          </div>
        </div>
      ):(
        <div className="full-list">
          <table>
            <thead>
              <tr>
                <th>Customer</th>
                <th>Email</th>
                <th>Quo Phone</th>
                <th>Onboarded</th>
                <th>HH Size</th>
                <th>Connect</th>
                <th>FU1 Date</th>
                <th>FU1 Status</th>
                <th>FU2 Date</th>
                <th>FU2 Status</th>
                <th>Issues</th>
                <th>Replacement</th>
                <th>Return</th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(c=>(
                <tr key={c.id} onClick={()=>setSelected(c)} style={{cursor:"pointer"}}>
                  <td style={{fontWeight:600}}>{c.name}{c.hasReturn?" ⚠":""}</td>
                  <td style={{fontSize:11,color:"#86868b"}}>{c.email}</td>
                  <td style={{fontSize:11,color:c.phone?"#bf5af2":"#c7c7cc"}}>{c.phone||"—"}</td>
                  <td>{parseD(c.onboard).toLocaleDateString("en-US",{month:"short",day:"numeric"})}</td>
                  <td>
                    <select className="hh-select" value={c.hhSize} onChange={e=>{e.stopPropagation();updateCustomer(c.id,{hhSize:e.target.value});}}>
                      <option value="1-2">1–2</option>
                      <option value="3-5">3–5</option>
                    </select>
                  </td>
                  <td><span className={`status-badge ${c.connectDone?"sb-completed":"sb-pending"}`} style={{fontSize:9}}>{(c.connectStatus||"pending")==="connected"?"✓ OTA":(c.connectStatus||"pending")==="sent"?"Sent":"—"}</span></td>
                  <td>{c.fu1Date.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</td>
                  <td><StatusBadge status={c.fu1Status} overdue={c.fu1Overdue}/></td>
                  <td>{c.fu2Date.toLocaleDateString("en-US",{month:"short",day:"numeric"})}</td>
                  <td><StatusBadge status={c.fu2Status} overdue={c.fu2Overdue}/></td>
                  <td>{c.hasIssue?<span style={{fontSize:10,fontWeight:700,color:"#e65100"}}>⚠ {c.tickets.length}</span>:<span style={{color:"#c7c7cc",fontSize:11}}>—</span>}</td>
                  <td>{c.hasReplacement?<span style={{fontSize:10,fontWeight:700,color:"#5856d6"}}>🔧 {c.replacements.length}</span>:<span style={{color:"#c7c7cc",fontSize:11}}>—</span>}</td>
                  <td>{c.hasReturn?<span style={{fontSize:10,fontWeight:700,color:"#951B1E"}}>📦 {c.returns.length||"⚠"}</span>:<span style={{color:"#c7c7cc",fontSize:11}}>—</span>}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      )}

      {selected&&<CustomerModal c={enriched.find(x=>x.id===selected.id)||selected} onClose={()=>setSelected(null)}/>}
      {dayDetail&&<DayPopup day={dayDetail.day} month={dayDetail.month} onClose={()=>setDayDetail(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
