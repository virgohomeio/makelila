<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

// ------------------------------------------------------------
// Helpers
// ------------------------------------------------------------
const Pill = ({ children, tone = "slate" }) => {
  const tones = {
    green:  "bg-emerald-100 text-emerald-800",
    yellow: "bg-amber-100 text-amber-800",
    red:    "bg-rose-100 text-rose-800",
    blue:   "bg-sky-100 text-sky-800",
    slate:  "bg-slate-100 text-slate-700",
    violet: "bg-violet-100 text-violet-800",
  };
  return <span className={`pill ${tones[tone] || tones.slate}`}>{children}</span>;
};

const statusTone = (s) => ({
  "Shipped":"green","Delivered":"green","Received":"green","Completed":"green","Fulfilled":"green","OK":"green","Active":"green","Paid":"green",
  "In Transit":"blue","In Progress":"blue",
  "Picking":"yellow","Pending":"yellow","Open":"yellow","Partial":"yellow","Planned":"slate","LOW":"yellow","Waiting":"yellow","Awaiting PO":"yellow",
  "Cancelled":"red","OUT":"red","REORDER":"red",
  "Available":"green","Unfulfilled":"yellow",
}[s] || "slate");

const money = (n, c) => n == null ? '—' : `${c==='CAD'?'CA$':c==='EUR'?'€':'$'}${Number(n).toLocaleString(undefined,{minimumFractionDigits:2, maximumFractionDigits:2})}`;
const fmt = (v) => v == null || v === '' ? <span className="text-slate-400">—</span> : v;

const Panel = ({ title, children, right }) => (
  <div className="bg-white rounded-lg border border-slate-200">
    <div className="px-4 py-3 border-b border-slate-200 flex items-center justify-between">
      <h3 className="font-semibold text-slate-800">{title}</h3>
      {right}
    </div>
    <div className="p-4 overflow-x-auto scroll-thin">{children}</div>
  </div>
);

const Row = ({ k, v }) => (
  <div className="flex justify-between gap-4 py-1"><span className="text-slate-500">{k}</span><span className="font-medium text-right">{v}</span></div>
);

// ------------------------------------------------------------
// Dashboard
// ------------------------------------------------------------
function Dashboard() {
  const openSOs   = SALES_ORDERS.filter(s => s.status === "Open").length;
  const deliveredSOs = SALES_ORDERS.filter(s => s.status === "Delivered").length;
  const rev30d = SALES_ORDERS.reduce((a, r) => a + (Number(r.total) || 0), 0);
  const totalInventoryValue = INVENTORY.reduce((a, r) => a + (Number(r.total_value) || 0), 0);
  const lowStock = INVENTORY.filter(r => r.alert === "REORDER" || r.status === "LOW").length;
  const inTransit = SERIALS.filter(s => s.status === "In Transit").length;
  const pendingSerials = SERIALS.filter(s => s.status === "Pending").length;
  const openTickets = SERIALS.filter(s => s.ticket).length;

  // Ashwini feedback KPIs
  const openTeamTasks = TEAM_TASKS.filter(t => t.status==='Open' || t.status==='In Progress').length;
  const openRepairs = REPAIR_TICKETS.filter(t => t.status==='Open' || t.status==='In Progress').length;
  const followupsDue = FOLLOWUPS.filter(f => f.due && new Date(f.due) <= new Date('2026-04-22')).length;
  const activeCampaigns = CAMPAIGNS.filter(c => new Date(c.end) >= new Date('2026-04-15')).length;
  const shipsMissingWeight = SHIPMENTS.filter(s => !s.weight || s.weight === 0).length;

  const kpis = [
    { label:"Revenue (YTD)",     val: `$${Math.round(rev30d).toLocaleString()}`, tone:"green" },
    { label:"Open Sales Orders", val: openSOs, tone: openSOs>15?"yellow":"blue" },
    { label:"Delivered Orders",  val: deliveredSOs, tone:"green" },
    { label:"Inventory Value",   val: `$${Math.round(totalInventoryValue).toLocaleString()}`, tone:"slate" },
    { label:"Low-Stock SKUs",    val: lowStock, tone: lowStock>0?"yellow":"green" },
    { label:"In Transit",        val: inTransit, tone:"blue" },
    { label:"Pending Fulfillment", val: pendingSerials, tone: pendingSerials>5?"yellow":"slate" },
    { label:"Linked Tickets",    val: openTickets, tone: openTickets>10?"yellow":"slate" },
    { label:"Open Team Tasks",   val: openTeamTasks, tone: openTeamTasks>0?"yellow":"slate" },
    { label:"Open Repairs",      val: openRepairs, tone: openRepairs>0?"red":"green" },
    { label:"Follow-ups Due 7d", val: followupsDue, tone: followupsDue>3?"yellow":"slate" },
    { label:"Active Campaigns",  val: activeCampaigns, tone:"violet" },
    { label:"Ships Missing Wt",  val: shipsMissingWeight, tone: shipsMissingWeight>10?"red":"yellow" },
  ];

  const reorder = INVENTORY.filter(r => r.alert === "REORDER" || r.status !== "OK");

  return (
    <div className="space-y-6">
      <div>
        <h1 className="text-2xl font-bold text-slate-800">Dashboard</h1>
        <p className="text-sm text-slate-500 mt-1">Live snapshot — seeded from VirgoHome Operations Hub</p>
      </div>

      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {kpis.map(k => (
          <div key={k.label} className="bg-white rounded-lg border border-slate-200 p-4">
            <div className="text-xs uppercase tracking-wide text-slate-500">{k.label}</div>
            <div className="mt-2 text-2xl font-bold text-slate-800">{k.val}</div>
            <div className="mt-2"><Pill tone={k.tone}>live</Pill></div>
          </div>
        ))}
      </div>

      <div className="grid lg:grid-cols-2 gap-6">
        <Panel title={`Reorder alerts (${reorder.length})`}>
          {reorder.length === 0 && <div className="text-slate-400 text-sm">All SKUs healthy.</div>}
          {reorder.length > 0 && (
            <table className="w-full text-sm">
              <thead className="text-left text-slate-500 border-b">
                <tr><th className="py-2">SKU</th><th>Name</th><th>Loc</th><th className="text-right">On Hand</th><th className="text-right">Reorder@</th><th>Status</th></tr>
              </thead>
              <tbody>
                {reorder.map((r, i) => (
                  <tr key={i} className="border-b last:border-0">
                    <td className="py-2 font-medium">{r.sku}</td>
                    <td>{r.name}</td>
                    <td className="text-xs">{r.loc}</td>
                    <td className="text-right">{r.on_hand}</td>
                    <td className="text-right text-slate-500">{r.reorder_point}</td>
                    <td><Pill tone={statusTone(r.alert || r.status)}>{r.alert || r.status}</Pill></td>
                  </tr>
                ))}
              </tbody>
            </table>
          )}
        </Panel>

        <Panel title="Recent sales orders">
          <table className="w-full text-sm">
            <thead className="text-left text-slate-500 border-b">
              <tr><th className="py-2">SO</th><th>Customer</th><th className="text-right">Total</th><th>Status</th></tr>
            </thead>
            <tbody>
              {SALES_ORDERS.slice(0, 8).map(s => (
                <tr key={s.so} className="border-b last:border-0">
                  <td className="py-2 font-mono text-xs">{s.so}</td>
                  <td className="truncate max-w-[180px]">{s.customer}</td>
                  <td className="text-right">{money(s.total, s.currency)}</td>
                  <td><Pill tone={statusTone(s.status)}>{s.status}</Pill></td>
                </tr>
              ))}
            </tbody>
          </table>
        </Panel>
      </div>

      <Panel title="Active make orders">
        <table className="w-full text-sm">
          <thead className="text-left text-slate-500 border-b">
            <tr><th className="py-2">MO</th><th>Product</th><th className="text-right">Qty</th><th className="text-right">Done</th><th>Due</th><th>Materials</th><th>Status</th></tr>
          </thead>
          <tbody>
            {MAKE_ORDERS.map(m => (
              <tr key={m.mo} className="border-b last:border-0">
                <td className="py-2 font-mono text-xs">{m.mo}</td>
                <td>{m.sku} <span className="text-slate-500">· {m.name}</span></td>
                <td className="text-right">{m.qty}</td>
                <td className="text-right">{m.completed}</td>
                <td>{m.due}</td>
                <td><Pill tone={statusTone(m.materials)}>{m.materials}</Pill></td>
                <td><Pill tone={statusTone(m.status)}>{m.status}</Pill></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Panel>
    </div>
  );
}

// ------------------------------------------------------------
// Sales Orders
// ------------------------------------------------------------
function SalesOrders() {
  const [sel, setSel] = useState(SALES_ORDERS[0]?.so);
  const [filter, setFilter] = useState('All');
  const filtered = SALES_ORDERS.filter(s => filter==='All' || s.status===filter);
  const order = SALES_ORDERS.find(s => s.so === sel);
  const custSerials = order ? SERIALS.filter(s => s.customer === order.customer) : [];

  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <h1 className="text-2xl font-bold text-slate-800">Sales Orders</h1>
        <div className="flex gap-1">
          {['All','Open','Delivered','Cancelled'].map(f => (
            <button key={f} onClick={()=>setFilter(f)}
              className={`px-3 py-1 text-xs rounded-lg border ${filter===f?'bg-emerald-600 text-white border-emerald-600':'bg-white text-slate-600 border-slate-200'}`}>{f}</button>
          ))}
        </div>
      </div>

      <div className="grid lg:grid-cols-3 gap-6">
        <div className="lg:col-span-2">
          <Panel title={`${filtered.length} orders`}>
            <div className="max-h-[600px] overflow-y-auto scroll-thin">
              <table className="w-full text-sm">
                <thead className="text-left text-slate-500 border-b sticky top-0 bg-white">
                  <tr><th className="py-2">SO</th><th>Date</th><th>Customer</th><th>SKU</th><th className="text-right">Total</th><th>Status</th></tr>
                </thead>
                <tbody>
                  {filtered.map(s => (
                    <tr key={s.so} onClick={() => setSel(s.so)}
                      className={`border-b last:border-0 cursor-pointer hover:bg-slate-50 ${sel===s.so?'bg-emerald-50':''}`}>
                      <td className="py-2 font-mono text-xs">{s.so}</td>
                      <td className="text-xs">{s.date}</td>
                      <td className="truncate max-w-[180px]">{s.customer}</td>
                      <td className="text-xs">{s.sku}</td>
                      <td className="text-right">{money(s.total, s.currency)}</td>
                      <td><Pill tone={statusTone(s.status)}>{s.status}</Pill></td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </Panel>
        </div>
        <div>
          <Panel title="Order detail">
            {order && (
              <div className="text-sm space-y-1">
                <Row k="SO" v={<span className="font-mono">{order.so}</span>} />
                <Row k="Date" v={order.date} />
                <Row k="Channel" v={order.channel} />
                <Row k="Customer" v={order.customer} />
                <Row k="Email" v={fmt(order.email)} />
                <Row k="Product" v={`${order.sku} × ${order.qty}`} />
                <Row k="Total" v={money(order.total, order.currency)} />
                <Row k="Payment" v={<Pill tone={statusTone(order.payment)}>{order.payment}</Pill>} />
                <Row k="Fulfillment" v={<Pill tone={statusTone(order.fulfill)}>{order.fulfill}</Pill>} />
                <Row k="Shipped" v={fmt(order.shipped_date)} />
                <Row k="Tracking" v={fmt(order.tracking)} />
                {order.notes && <Row k="Notes" v={<span className="text-xs text-right">{order.notes}</span>} />}
                <div className="pt-3 border-t mt-3">
                  <div className="text-xs uppercase tracking-wide text-slate-500 mb-2">Linked serials ({custSerials.length})</div>
                  {custSerials.length === 0 && <div className="text-slate-400 text-xs">No serials linked</div>}
                  {custSerials.slice(0,5).map(s => (
                    <div key={s.sn} className="font-mono text-xs py-1 flex items-center justify-between gap-2">
                      <span className="truncate">{s.sn}</span>
                      {s.ticket && <Pill tone="yellow">{s.ticket}</Pill>}
                    </div>
                  ))}
                </div>
              </div>
            )}
          </Panel>
        </div>
      </div>
    </div>
  );
}

// ------------------------------------------------------------
// Inventory
// ------------------------------------------------------------
function Inventory() {
  return (
    <div className="space-y-6">
      <h1 className="text-2xl font-bold text-slate-800">Inventory</h1>
      <Panel title="On-hand by SKU × location">
        <table className="w-full text-sm">
          <thead className="text-left text-slate-500 border-b">
            <tr>
              <th className="py-2">SKU</th><th>Name</th><th>Location</th>
              <th className="text-right">On Hand</th><th className="text-right">Committed</th>
              <th className="text-right">Available</th><th className="text-right">Expected</th>
              <th className="text-right">Reorder@</th><th>Batch</th><th className="text-right">Value</th><th>Alert</th>
            </tr>
          </thead>
          <tbody>
            {INVENTORY.map((r, i) => (
              <tr key={i} className="border-b last:border-0">
                <td className="py-2 font-medium">{r.sku}</td>
                <td>{r.name}</td>
                <td className="text-xs">{r.loc}</td>
                <td className="text-right">{r.on_hand}</td>
                <td className="text-right">{r.committed}</td>
                <td className="text-right font-semibold">{r.available}</td>
                <td className="text-right text-slate-500">{r.expected}</td>
                <td className="text-right text-slate-500">{r.reorder_point}</td>
                <td className="font-mono text-xs">{r.batch}</td>
                <td className="text-right">${Number(r.total_value || 0).toLocaleString()}</td>
                <td><Pill tone={statusTone(r.alert || r.status)}>{r.alert || r.status}</Pill></td>
              </tr>
            ))}
          </tbody>
        </table>
      </Panel>

      <Panel title="Products">
        <table className="w-full text-sm">
          <thead className="text-left text-slate-500 border-b">
            <tr><th className="py-2">SKU</th><th>Name</th><th>Category</th><th className="text-right">Price</th><th className="text-right">Cost</th><th className="text-right">Reorder@</th><th className="text-right">Lead</th><th>Primary Supplier</th></tr>
          </thead>
          <tbody>
            {PRODUCTS.map(p => (
              <tr key={p.sku} className="border-b last:border-0">
                <td className="py-2 font-medium">{p.sku}</td>
                <td>{p.name}</td>
                <td className="text-xs">{p.category}</td>
                <td className="text-right">{money(p.price, p.currency)}</td>
                <td className="text-right text-slate-500">{p.cost ? money(p.cost, p.currency) : '—'}</td>
                <td className="text-right">{p.reorder_point}</td>
                <td className="text-right">{p.lead_time}d</td>
                <td className="text-xs">{p.supplier}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Panel>
    </div>
  );
}

// ------------------------------------------------------------
// Make Orders
// ------------------------------------------------------------
function MakeOrders() {
  return (
    <div className="space-y-6">
      <h1 className="text-2xl font-bold text-slate-800">Make Orders</h1>
      <Panel title="Production runs">

        <div className="bg-white rounded-lg border border-slate-200 p-4"><div className="text-xs uppercase text-slate-500">Not on Dashboard</div><div className="text-2xl font-bold mt-1">{FOLLOWUPS.filter(f=>!f.dash).length}</div></div>
      </div>
      <Panel title="Follow-up pipeline">
        <table className="w-full text-sm">
          <thead className="text-left text-slate-500 border-b">
            <tr><th className="py-2">Customer</th><th>Shipped</th><th>Onboarded</th><th>FU-1</th><th>FU-2</th><th>Compost?</th><th>Review</th><th>Sw</th><th>Dash</th><th>Action Item</th><th>Due</th></tr>
          </thead>
          <tbody>
            {FOLLOWUPS.map((f,i) => (
              <tr key={i} className="border-b last:border-0">
                <td className="py-2 font-medium">{f.customer}</td>
                <td className="text-xs">{f.ship}</td>
                <td className="text-xs">{fmt(f.onboarding)}</td>
                <td className="text-xs">{fmt(f.fu1)}</td>
                <td className="text-xs">{fmt(f.fu2)}</td>
                <td>{f.compost ? <Pill tone="green">Yes</Pill> : <Pill tone="slate">No</Pill>}</td>
                <td><Pill tone={f.review==='Yes'?'green':f.review==='No'?'red':'yellow'}>{f.review}</Pill></td>
                <td className="text-xs">{f.sw}</td>
                <td>{f.dash ? <Pill tone="green">Y</Pill> : <Pill tone="slate">N</Pill>}</td>
                <td className="text-xs">{fmt(f.action)}</td>
                <td className="text-xs">{f.due ? <span className={new Date(f.due) <= new Date('2026-04-16') ? 'text-amber-600 font-semibold' : ''}>{f.due}</span> : <span className="text-slate-400">-</span>}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Panel>
    </div>
  );
}

function TeamTasks() {
  const [filter, setFilter] = useState('All');
  const filtered = TEAM_TASKS.filter(t => filter==='All' || t.status===filter);
  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-slate-800">Team Tasks</h1>
          <p className="text-sm text-slate-500 mt-1">Cross-team escalation log - replaces "To Ask Team Members" tab</p>
        </div>
        <div className="flex gap-1">
          {['All','Open','In Progress','Resolved','Irrelevant'].map(f => (
            <button key={f} onClick={()=>setFilter(f)}
              className={`px-3 py-1 text-xs rounded-lg border ${filter===f?'bg-emerald-600 text-white border-emerald-600':'bg-white text-slate-600 border-slate-200'}`}>{f}</button>
          ))}
        </div>
      </div>
      <Panel title={`${filtered.length} tasks`}>
        <table className="w-full text-sm">
          <thead className="text-left text-slate-500 border-b">
            <tr><th className="py-2">Task</th><th>Raised</th><th>By</th><th>Assigned</th><th>Customer</th><th>SO</th><th>Description</th><th>Status</th><th>Replied</th></tr>
          </thead>
          <tbody>
            {filtered.map(t => (
              <tr key={t.id} className="border-b last:border-0">
                <td className="py-2 font-mono text-xs">{t.id}</td>
                <td className="text-xs">{t.raised}</td>
                <td className="text-xs">{t.by}</td>
                <td className="text-xs font-medium">{t.to}</td>
                <td className="text-xs">{t.customer}</td>
                <td className="text-xs font-mono">{fmt(t.so)}</td>
                <td className="text-xs">{t.desc}</td>
                <td><Pill tone={statusTone(t.status)}>{t.status}</Pill></td>
                <td className="text-xs">{fmt(t.reply)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Panel>
    </div>
  );
}

function Campaigns() {
  const totalBuyers = CAMPAIGNS.reduce((a,c)=>a+c.buyers,0);
  const totalRev = CAMPAIGNS.reduce((a,c)=>a+c.revenue,0);
  return (
    <div className="space-y-6">
      <div>
        <h1 className="text-2xl font-bold text-slate-800">Marketing Campaigns</h1>
        <p className="text-sm text-slate-500 mt-1">Pedrum - unified campaign tracker - links to Sales Orders via campaign_id</p>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        <div className="bg-white rounded-lg border border-slate-200 p-4"><div className="text-xs uppercase text-slate-500">Active Campaigns</div><div className="text-2xl font-bold mt-1">{CAMPAIGNS.filter(c=>new Date(c.end)>=new Date('2026-04-15')).length}</div></div>
        <div className="bg-white rounded-lg border border-slate-200 p-4"><div className="text-xs uppercase text-slate-500">Total Buyers</div><div className="text-2xl font-bold mt-1">{totalBuyers}</div></div>
        <div className="bg-white rounded-lg border border-slate-200 p-4"><div className="text-xs uppercase text-slate-500">Total Revenue</div><div className="text-2xl font-bold mt-1">${totalRev.toLocaleString()}</div></div>
        <div className="bg-white rounded-lg border border-slate-200 p-4"><div className="text-xs uppercase text-slate-500">Avg Order Value</div><div className="text-2xl font-bold mt-1">${Math.round(totalRev/totalBuyers).toLocaleString()}</div></div>
      </div>
      <Panel title="All campaigns">
        <table className="w-full text-sm">
          <thead className="text-left text-slate-500 border-b">
            <tr><th className="py-2">Code</th><th>Name</th><th>Channel</th><th>Start</th><th>End</th><th>Discount</th><th className="text-right">Buyers</th><th className="text-right">Revenue</th><th className="text-right">AOV</th><th>Regions</th></tr>
          </thead>
          <tbody>
            {CAMPAIGNS.map(c => (
              <tr key={c.code} className="border-b last:border-0">
                <td className="py-2 font-mono text-xs">{c.code}</td>
                <td>{c.name}</td>
                <td className="text-xs">{c.channel}</td>
                <td className="text-xs">{c.start}</td>
                <td className="text-xs">{c.end}</td>
                <td className="text-xs font-mono">{fmt(c.discount)}</td>
                <td className="text-right">{c.buyers}</td>
                <td className="text-right">${c.revenue.toLocaleString()}</td>
                <td className="text-right">${c.aov.toLocaleString()}</td>
                <td className="text-xs">{c.regions}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Panel>
      <Panel title="Plan breakdown (Outright / 12mo / 36mo / Sezzle)">
        <table className="w-full text-sm">
          <thead className="text-left text-slate-500 border-b">
            <tr><th className="py-2">Campaign</th><th className="text-right">Outright</th><th className="text-right">12-month</th><th className="text-right">36-month</th><th className="text-right">Sezzle</th></tr>
          </thead>
          <tbody>
            {CAMPAIGNS.map(c => (
              <tr key={c.code} className="border-b last:border-0">
                <td className="py-2 font-mono text-xs">{c.code}</td>
                <td className="text-right">{c.plans.Outright}</td>
                <td className="text-right">{c.plans['12mo']}</td>
                <td className="text-right">{c.plans['36mo']}</td>
                <td className="text-right">{c.plans.Sezzle}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Panel>
    </div>
  );
}

function RepairTickets() {
  const [filter, setFilter] = useState('All');
  const filtered = REPAIR_TICKETS.filter(t => filter==='All' || t.status===filter);
  return (
    <div className="space-y-6">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-2xl font-bold text-slate-800">Repair Tickets</h1>
          <p className="text-sm text-slate-500 mt-1">Junaid - machine repair log - linked to Serial Tracker</p>
        </div>
        <div className="flex gap-1">
          {['All','Open','In Progress','Resolved','Scrapped'].map(f => (
            <button key={f} onClick={()=>setFilter(f)}
              className={`px-3 py-1 text-xs rounded-lg border ${filter===f?'bg-emerald-600 text-white border-emerald-600':'bg-white text-slate-600 border-slate-200'}`}>{f}</button>
          ))}
        </div>
      </div>
      <Panel title={`${filtered.length} tickets`}>
        <table className="w-full text-sm">
          <thead className="text-left text-slate-500 border-b">
            <tr><th className="py-2">Ticket</th><th>Opened</th><th>Serial</th><th>Customer</th><th>Batch</th><th>Type</th><th>Problem</th><th>Parts Needed</th><th>Status</th><th>Resolved</th><th>Signed Off</th></tr>
          </thead>
          <tbody>
            {filtered.map(t => (
              <tr key={t.id} className="border-b last:border-0">
                <td className="py-2 font-mono text-xs">{t.id}</td>
                <td className="text-xs">{t.opened}</td>
                <td className="font-mono text-xs">{t.serial}</td>
                <td className="text-xs">{t.customer}</td>
                <td className="text-xs">{t.batch}</td>
                <td><Pill tone={t.type==='Hardware'?'red':t.type==='Firmware'?'blue':'slate'}>{t.type}</Pill></td>
                <td className="text-xs">{t.problem}</td>
                <td className="text-xs">{t.parts}</td>
                <td><Pill tone={statusTone(t.status)}>{t.status}</Pill></td>
                <td className="text-xs">{fmt(t.resolved)}</td>
                <td className="text-xs">{fmt(t.signoff)}</td>
              </tr>
            ))}
          </tbody>
        </table>
      </Panel>
    </div>
  );
}

// Shell

const NAV = [
  { key:"dashboard", label:"Dashboard",     icon:"▦" },
  { key:"so",        label:"Sales Orders",  icon:"⊞" },
  { key:"fulfill",   label:"Fulfillment",   icon:"◇" },
  { key:"inv",       label:"Inventory",     icon:"▤" },
  { key:"mo",        label:"Make Orders",   icon:"⚒" },
  { key:"po",        label:"Purchase Orders", icon:"$" },
  { key:"serial",    label:"Serial Tracker", icon:"#" },
  { key:"ship",      label:"Shipments",     icon:"➤" },
  { key:"cust",      label:"Customers",     icon:"◉" },
  { key:"followups", label:"Follow-ups",    icon:"✉" },
  { key:"tasks",     label:"Team Tasks",    icon:"!" },
  { key:"campaigns", label:"Campaigns",     icon:"▲" },
  { key:"repair",    label:"Repair Tickets", icon:"⚙" },
  { key:"settings",  label:"Settings",      icon:"☰" },
];

function App() {
  const [view, setView] = useState("dashboard");
  const render = () => ({
    dashboard: <Dashboard />, so: <SalesOrders />, fulfill: <Fulfillment />,
    inv: <Inventory />, mo: <MakeOrders />, po: <PurchaseOrders />,
    serial: <SerialTracker />, ship: <Shipments />, cust: <Customers />,
    followups: <Followups />, tasks: <TeamTasks />, campaigns: <Campaigns />,
    repair: <RepairTickets />, settings: <Settings />,
  })[view] || <Dashboard />;

  return (
    <div className="min-h-screen flex">
      <aside className="w-60 bg-slate-900 text-slate-200 flex flex-col">
        <div className="px-5 py-5 border-b border-slate-800">
          <div className="text-xl font-bold text-white">makelila</div>
          <div className="text-xs text-emerald-400 mt-1">Operations Hub - Lite</div>
        </div>
        <nav className="flex-1 py-3 overflow-y-auto">
          {NAV.map(n => (
            <button key={n.key} onClick={() => setView(n.key)}
              className={`w-full text-left px-5 py-2 text-sm flex items-center gap-3 transition ${view===n.key?"bg-emerald-600 text-white":"hover:bg-slate-800 text-slate-300"}`}>
              <span className="w-5 text-center opacity-80">{n.icon}</span>
              <span>{n.label}</span>
            </button>
          ))}
        </nav>
        <div className="px-5 py-4 border-t border-slate-800 text-xs text-slate-400">
          <div>huayi@virgohome.io</div>
          <div className="mt-1">role: admin</div>
        </div>
      </aside>
      <main className="flex-1 p-8 overflow-auto">{render()}</main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
