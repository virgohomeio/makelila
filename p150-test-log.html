/* Build full 1–150 array, then sort ascending by serial number */
const UNITS=[];
for(let i=1;i<=150;i++){
  if(KNOWN[i]){
    const k=KNOWN[i];
    UNITS.push({id:i,sn:"LL01-00000000"+k.sn,colour:k.c==="W"?"White":k.c==="B"?"Black":"Unknown",
      defect:k.def,delivered:k.del,returned:k.ret,prepared:k.prep,notes:k.n,
      issues:k.iss.length?k.iss:k.del?["Delivered to Customer"]:["—"],
      action:k.act,difficulty:k.diff||null,fix:k.fix||null});
  } else {
    /* Skip — not in Notion Counter */
  }
}
UNITS.sort((a,b)=>{
  if(a.sn==="—"&&b.sn!=="—") return 1;
  if(a.sn!=="—"&&b.sn==="—") return -1;
  return a.sn.localeCompare(b.sn);
});

function App(){
  const [filter,setFilter]=useState("all");
  const [colourFilter,setColourFilter]=useState("all");
  const [search,setSearch]=useState("");
  const [expandedRow,setExpandedRow]=useState(null);
  const [overrides,setOverrides]=useState({});
  const [hideDelivered,setHideDelivered]=useState(false);

  const filtered=useMemo(()=>{
    return UNITS.filter(u=>{
      const act=overrides[u.id]||u.action;
      if(hideDelivered && act==="delivered") return false;
      if(filter!=="all" && act!==filter) return false;
      if(colourFilter!=="all" && u.colour!==colourFilter) return false;
      if(search){
        const q=search.toLowerCase();
        if(!u.sn.toLowerCase().includes(q) && !u.notes.toLowerCase().includes(q) && !u.issues.join(" ").toLowerCase().includes(q) && !String(u.id).includes(q)) return false;
      }
      return true;
    });
  },[filter,colourFilter,search,overrides,hideDelivered]);

  const counts=useMemo(()=>{
    const c={scrap:0,rework:0,"rework-conditional":0,diagnose:0,"diagnose-return":0,ship:0,delivered:0,missing:0,total:0};
    UNITS.forEach(u=>{c[overrides[u.id]||u.action]++});
    return c;
  },[overrides]);

  const toggleRow=id=>setExpandedRow(p=>p===id?null:id);
  const cycleAction=(id,e)=>{
    e.stopPropagation();
    const actions=["scrap","rework","rework-conditional","diagnose","diagnose-return","ship","delivered","missing"];
    const cur=overrides[id]||UNITS.find(u=>u.id===id)?.action;
    const next=actions[(actions.indexOf(cur)+1)%actions.length];
    setOverrides(p=>({...p,[id]:next}));
  };

  const totalCount=counts.scrap+counts.rework+counts["rework-conditional"]+counts.diagnose+counts["diagnose-return"]+counts.ship+counts.delivered+counts.missing;
  const cardData=[
    {key:"all",label:"Total",count:totalCount,isTotal:true},
    {key:"delivered",label:"Delivered",count:counts.delivered},
    {key:"rework",label:"Rework",count:counts.rework},
    {key:"rework-conditional",label:"Conditional",count:counts["rework-conditional"]},
    {key:"diagnose",label:"Diagnose",count:counts.diagnose},
    {key:"diagnose-return",label:"Returns",count:counts["diagnose-return"]},
    {key:"scrap",label:"Scrap",count:counts.scrap},
    {key:"ship",label:"Ship Ready",count:counts.ship},
  ];

  return (
    <div style={{maxWidth:1100,margin:"0 auto",padding:"36px 20px 60px"}}>
      {/* Header */}
      <div style={{marginBottom:28}}>
        <div style={{fontSize:12,fontWeight:600,letterSpacing:1,textTransform:"uppercase",color:"#86868b",marginBottom:6}}>LILA Pro · P150 Batch · 150 Units</div>
        <h1 style={{fontSize:28,fontWeight:700,color:"#1d1d1f",letterSpacing:"-0.025em"}}>Defect Assessment</h1>
        <p style={{fontSize:14,color:"#86868b",marginTop:4}}>Complete inventory P150-001 through P150-150 — click rows for details, click action to override</p>
      </div>

      {/* Summary Cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(8,1fr)",gap:8,marginBottom:24}}>
        {cardData.map(c=>{
          const isTotal=c.isTotal;
          const cfg=isTotal?null:ACTION_CONFIG[c.key];
          const active=isTotal?(filter==="all"):filter===c.key;
          return(
            <div key={c.key} onClick={()=>setFilter(isTotal?"all":(f=>f===c.key?"all":c.key))}
              style={{background:isTotal?"#1d1d1f":"#fff",borderRadius:12,padding:"14px 12px",cursor:"pointer",transition:"all .2s",
                border:active?(isTotal?"2px solid #1d1d1f":`2px solid ${cfg.dot}`):"1px solid #e5e5ea",
                boxShadow:active?(isTotal?"0 0 0 3px rgba(29,29,31,0.15)":`0 0 0 3px ${cfg.dot}18`):"0 1px 3px rgba(0,0,0,0.04)"}}>
              <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:6}}>
                {!isTotal&&<span style={{width:7,height:7,borderRadius:"50%",background:cfg.dot}}/>}
                <span style={{fontSize:10,fontWeight:600,color:isTotal?"#aeaeb2":"#86868b",letterSpacing:"0.02em"}}>{c.label}</span>
              </div>
              <div style={{fontSize:24,fontWeight:700,color:isTotal?"#fff":cfg.text,letterSpacing:"-0.03em"}}>{c.count}</div>
            </div>
          );
        })}
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
        <div style={{flex:1,minWidth:200,position:"relative"}}>
          <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",color:"#aeaeb2",fontSize:14}}>⌕</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search ID, serial, notes, issue…"
            style={{width:"100%",padding:"9px 12px 9px 32px",borderRadius:10,border:"1px solid #e5e5ea",background:"#fff",
              color:"#1d1d1f",fontSize:13,fontFamily:"inherit",outline:"none",transition:"border .2s,box-shadow .2s"}}
            onFocus={e=>{e.target.style.borderColor="#007aff";e.target.style.boxShadow="0 0 0 3px rgba(0,122,255,0.12)"}}
            onBlur={e=>{e.target.style.borderColor="#e5e5ea";e.target.style.boxShadow="none"}}/>
        </div>
        <select value={colourFilter} onChange={e=>setColourFilter(e.target.value)}
          style={{padding:"9px 12px",borderRadius:10,border:"1px solid #e5e5ea",background:"#fff",color:"#1d1d1f",fontSize:13,fontFamily:"inherit"}}>
          <option value="all">All Colours</option><option value="White">White</option><option value="Black">Black</option><option value="Unknown">Unknown</option>
        </select>
        <label style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"#6e6e73",cursor:"pointer",padding:"9px 14px",borderRadius:10,border:"1px solid #e5e5ea",background:hideDelivered?"#eef2ff":"#fff"}}>
          <input type="checkbox" checked={hideDelivered} onChange={e=>setHideDelivered(e.target.checked)} style={{accentColor:"#6366f1"}}/>
          Hide Delivered
        </label>
        {filter!=="all"&&(
          <button onClick={()=>setFilter("all")} style={{padding:"9px 14px",borderRadius:10,border:"1px solid #e5e5ea",background:"#fff",color:"#1d1d1f",fontSize:12,fontFamily:"inherit",fontWeight:600,cursor:"pointer"}}>Clear ✕</button>
        )}
        <span style={{fontSize:12,color:"#aeaeb2",fontWeight:500}}>{filtered.length} of {UNITS.length}</span>
      </div>

      {/* Table */}
      <div style={{borderRadius:14,overflow:"hidden",background:"#fff",border:"1px solid #e5e5ea",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:"#fafafa"}}>
              {["Serial Number","Colour","Status","Issue(s)","Difficulty","Action"].map((h,i)=>(
                <th key={h} style={{padding:"10px 14px",textAlign:i===5?"center":"left",color:"#86868b",fontWeight:600,fontSize:10,textTransform:"uppercase",letterSpacing:"0.06em",borderBottom:"1px solid #e5e5ea"}}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {filtered.map((u,i)=>{
              const act=overrides[u.id]||u.action;
              const cfg=ACTION_CONFIG[act];
              const isExp=expandedRow===u.id;
              const isOver=overrides[u.id]&&overrides[u.id]!==u.action;
              const isMissing=act==="missing";
              const isDel=act==="delivered";
              const rowOpacity=isMissing?.45:isDel?.55:1;

              return(
                <React.Fragment key={u.id}>
                  <tr onClick={()=>toggleRow(u.id)}
                    style={{background:isExp?"#fafafa":"#fff",cursor:"pointer",transition:"background .12s",opacity:rowOpacity}}
                    onMouseEnter={e=>{if(!isExp)e.currentTarget.style.background="#fafafa"}}
                    onMouseLeave={e=>{if(!isExp)e.currentTarget.style.background="#fff"}}>

                    <td style={tdS}>
                      {u.sn==="—"?(
                        <span style={{color:"#d4d4d4",fontSize:12}}>—</span>
                      ):(
                        <span>
                          <span style={{fontFamily:"'SF Mono',SFMono-Regular,Menlo,monospace",fontWeight:600,fontSize:12,color:"#1d1d1f"}}>{u.sn.slice(-3)}</span>
                          <span style={{color:"#aeaeb2",marginLeft:2,fontSize:10,fontFamily:"'SF Mono',SFMono-Regular,Menlo,monospace"}}>{u.sn.slice(5,-3)}</span>
                          {u.returned&&<span style={{marginLeft:6,fontSize:9,padding:"1px 5px",borderRadius:4,background:"#faf5ff",color:"#9333ea",border:"1px solid #e9d5ff",fontWeight:600}}>RTN</span>}
                          {u.prepared&&<span style={{marginLeft:6,fontSize:9,padding:"1px 5px",borderRadius:4,background:"#f0fdfa",color:"#0d9488",border:"1px solid #99f6e4",fontWeight:600}}>PREP</span>}
                        </span>
                      )}
                    </td>

                    <td style={tdS}>
                      {u.colour==="—"?<span style={{color:"#d4d4d4"}}>—</span>:(
                        <span style={{display:"inline-flex",alignItems:"center",gap:5}}>
                          <span style={{width:12,height:12,borderRadius:"50%",border:"1.5px solid #d2d2d7",
                            background:u.colour==="White"?"#fff":u.colour==="Black"?"#1d1d1f":"#aeaeb2",
                            boxShadow:"0 1px 2px rgba(0,0,0,0.08)"}}/>
                          <span style={{color:"#6e6e73",fontSize:12,fontWeight:500}}>{u.colour}</span>
                        </span>
                      )}
                    </td>

                    <td style={tdS}>
                      <span style={{fontSize:10,padding:"3px 8px",borderRadius:5,fontWeight:600,
                        background:cfg.bg,color:cfg.text,border:`1px solid ${cfg.border}`}}>
                        {cfg.label}
                      </span>
                    </td>

                    <td style={tdS}>
                      <div style={{display:"flex",flexWrap:"wrap",gap:3}}>
                        {u.issues.map((iss,j)=>{
                          const isU=iss.includes("Undiagnosed"),isR=iss==="Customer Return"||iss==="Odor Issue",isOk=iss.includes("None"),isDlv=iss.includes("Delivered"),isMi=iss.includes("Not in");
                          const s=isMi?{bg:"#fafafa",c:"#a3a3a3",b:"#e5e5e5"}:isDlv?{bg:"#f8fafc",c:"#64748b",b:"#e2e8f0"}:isU?{bg:"#eef2ff",c:"#4f46e5",b:"#c7d2fe"}:isR?{bg:"#faf5ff",c:"#9333ea",b:"#e9d5ff"}:isOk?{bg:"#f0fdfa",c:"#0d9488",b:"#99f6e4"}:{bg:"#fff7ed",c:"#c2410c",b:"#fed7aa"};
                          return <span key={j} style={{fontSize:10,padding:"2px 7px",borderRadius:5,fontWeight:500,background:s.bg,color:s.c,border:`1px solid ${s.b}`}}>{iss}</span>;
                        })}
                      </div>
                    </td>

                    <td style={tdS}>
                      {u.difficulty&&(()=>{
                        const dc=DIFF_COLORS[u.difficulty]||DIFF_COLORS.Unknown;
                        return <span style={{fontSize:10,padding:"2px 7px",borderRadius:5,fontWeight:600,background:dc.bg,color:dc.text,border:`1px solid ${dc.border}`}}>{u.difficulty}</span>;
                      })()}
                    </td>

                    <td style={{...tdS,textAlign:"center"}}>
                      <button onClick={e=>cycleAction(u.id,e)}
                        style={{fontSize:11,padding:"5px 11px",borderRadius:7,cursor:"pointer",fontWeight:600,
                          fontFamily:"inherit",background:cfg.bg,color:cfg.text,border:`1.5px solid ${cfg.border}`,
                          boxShadow:isOver?`0 0 0 2px ${cfg.dot}30`:"none",transition:"all .15s"}}>
                        <span style={{marginRight:3}}>{cfg.icon}</span>{cfg.label}
                      </button>
                    </td>
                  </tr>

                  {isExp&&!isMissing&&(
                    <tr style={{background:"#fafafa"}}>
                      <td colSpan={6} style={{padding:"0 14px 14px",borderBottom:"1px solid #e5e5ea"}}>
                        <div style={{background:"#fff",borderRadius:10,border:"1px solid #e5e5ea",padding:"14px 18px",
                          display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,fontSize:13}}>
                          <div>
                            <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,color:cfg.text,marginBottom:5}}>Recommendation</div>
                            <div style={{color:"#1d1d1f",lineHeight:1.6}}>{u.fix||(isDel?"With customer. No action needed.":"Run PC application test to identify failure mode.")}</div>
                          </div>
                          <div>
                            <div style={{fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,color:"#86868b",marginBottom:5}}>Details</div>
                            <div style={{color:"#6e6e73",lineHeight:1.6}}>{u.notes||"No additional notes"}</div>
                            <div style={{marginTop:8,padding:"7px 10px",borderRadius:7,background:"#f5f5f7",fontSize:11,color:"#aeaeb2"}}>
                              P150-{String(u.id).padStart(3,"0")} · SN: {u.sn} · Defect: <b style={{color:"#1d1d1f"}}>{u.defect?"Yes":"No"}</b> · Returned: <b style={{color:"#1d1d1f"}}>{u.returned?"Yes":"No"}</b>
                            </div>
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Recovery Footer */}
      <div style={{marginTop:24,borderRadius:14,background:"#fff",border:"1px solid #e5e5ea",overflow:"hidden",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <div style={{padding:"18px 22px 0"}}>
          <h3 style={{fontSize:15,fontWeight:700,color:"#1d1d1f",letterSpacing:"-0.01em"}}>Recovery Estimate <span style={{fontSize:12,fontWeight:400,color:"#86868b"}}>(non-delivered units)</span></h3>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:0,padding:"14px 10px"}}>
          {[
            {n:counts.rework+counts.ship,label:"Recoverable now",sub:"Low-effort rework + ready to ship",color:ACTION_CONFIG.rework},
            {n:counts["rework-conditional"],label:"Pending assessment",sub:"Need software fix or parts",color:ACTION_CONFIG["rework-conditional"]},
            {n:counts.diagnose+counts["diagnose-return"],label:"Need testing",sub:"PC test + physical inspection",color:ACTION_CONFIG.diagnose},
            {n:counts.scrap,label:"Parts donors",sub:"Harvest components for rework",color:ACTION_CONFIG.scrap},
          ].map((b,i)=>(
            <div key={i} style={{padding:"6px 12px",borderRight:i<3?"1px solid #f0f0f0":"none"}}>
              <div style={{fontSize:22,fontWeight:700,color:b.color.text,letterSpacing:"-0.02em"}}>{b.n}</div>
              <div style={{fontSize:12,fontWeight:600,color:"#1d1d1f",marginTop:1}}>{b.label}</div>
              <div style={{fontSize:11,color:"#aeaeb2",marginTop:1}}>{b.sub}</div>
            </div>
          ))}
        </div>
        <div style={{margin:"0 22px 18px",padding:"14px",borderRadius:10,background:"#f5f5f7"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:10,fontWeight:700,color:"#6e6e73",textTransform:"uppercase",letterSpacing:1}}>In-House Recovery Potential</span>
            <span style={{fontSize:15,fontWeight:700,color:"#1d1d1f"}}>{Math.round(((counts.rework+counts.ship+counts["rework-conditional"]+counts.diagnose+counts["diagnose-return"])/(UNITS.length-counts.delivered-counts.missing))*100)||0}%</span>
          </div>
          <div style={{height:8,borderRadius:4,background:"#e5e5ea",overflow:"hidden",display:"flex"}}>
            {[
              {w:counts.delivered,c:"#94a3b8"},{w:counts.rework+counts.ship,c:"#22c55e"},
              {w:counts["rework-conditional"],c:"#eab308"},{w:counts.diagnose+counts["diagnose-return"],c:"#6366f1"},
              {w:counts.scrap,c:"#ef4444"},{w:counts.missing,c:"#d4d4d4"}
            ].map((s,i)=><div key={i} style={{width:`${s.w/UNITS.length*100}%`,background:s.c,transition:"width .4s"}}/>)}
          </div>
          <div style={{display:"flex",gap:14,marginTop:8,fontSize:10,color:"#86868b",fontWeight:500,flexWrap:"wrap"}}>
            {[{c:"#94a3b8",l:`Delivered (${counts.delivered})`},{c:"#22c55e",l:`Rework (${counts.rework+counts.ship})`},{c:"#eab308",l:`Conditional (${counts["rework-conditional"]})`},{c:"#6366f1",l:`Diagnose (${counts.diagnose+counts["diagnose-return"]})`},{c:"#ef4444",l:`Scrap (${counts.scrap})`},{c:"#d4d4d4",l:`Missing (${counts.missing})`}].map(d=>(
              <span key={d.l}><span style={{display:"inline-block",width:7,height:7,borderRadius:2,background:d.c,marginRight:4,verticalAlign:"middle"}}/>{d.l}</span>
            ))}
          </div>
        </div>
      </div>

      <div style={{marginTop:16,textAlign:"center",fontSize:11,color:"#aeaeb2"}}>
        VCycene Inc. · LILA Pro P150 · Source: Kishore's Notion · {new Date().toLocaleDateString()}
      </div>
    </div>
  );
}

const tdS={padding:"9px 14px",borderBottom:"1px solid #f0f0f0",verticalAlign:"middle"};

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
