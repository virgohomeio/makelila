function App() {
  const [filter, setFilter] = useState("all");
  const [colourFilter, setColourFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [expandedRow, setExpandedRow] = useState(null);
  const [overrides, setOverrides] = useState({});

  const filtered = useMemo(() => {
    return UNITS.filter(u => {
      const act = overrides[u.sn] || u.action;
      if (filter !== "all" && act !== filter) return false;
      if (colourFilter !== "all" && u.colour !== colourFilter) return false;
      if (search && !u.sn.toLowerCase().includes(search.toLowerCase()) && !u.notes.toLowerCase().includes(search.toLowerCase()) && !u.issues.join(" ").toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    });
  }, [filter, colourFilter, search, overrides]);

  const counts = useMemo(() => {
    const c = {scrap:0,rework:0,"rework-conditional":0,diagnose:0,"diagnose-return":0,ship:0,total:UNITS.length};
    UNITS.forEach(u => { c[overrides[u.sn] || u.action]++; });
    return c;
  }, [overrides]);

  const toggleRow = (sn) => setExpandedRow(prev => prev === sn ? null : sn);
  const cycleAction = (sn, e) => {
    e.stopPropagation();
    const actions = ["scrap","rework","rework-conditional","diagnose","diagnose-return","ship"];
    const current = overrides[sn] || UNITS.find(u=>u.sn===sn)?.action;
    const next = actions[(actions.indexOf(current)+1) % actions.length];
    setOverrides(prev => ({...prev, [sn]: next}));
  };

  return (
    <div style={{maxWidth:1100,margin:"0 auto",padding:"40px 24px"}}>
      {/* Header */}
      <div style={{marginBottom:32,display:"flex",alignItems:"flex-end",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
        <div>
          <div style={{fontSize:11,fontWeight:700,letterSpacing:2,textTransform:"uppercase",color:"#CC2D30",marginBottom:6}}>LILA Pro · P150 Batch</div>
          <h1 style={{fontSize:26,fontWeight:700,color:"#2C2A25",letterSpacing:"-0.02em"}}>Defect Assessment Dashboard</h1>
          <p style={{fontSize:13,color:"#A39B8F",marginTop:4}}>58 units in-house — click rows for details, click action to override</p>
        </div>
        <div style={{fontSize:11,color:"#A39B8F",textAlign:"right"}}>
          Source: Kishore's Notion<br/>Updated: April 2026
        </div>
      </div>

      {/* Summary Cards */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(150px,1fr))",gap:12,marginBottom:28}}>
        {[
          {key:"scrap",label:"Scrap",count:counts.scrap,color:"#991B1E",bg:"#991B1E08",borderC:"#991B1E25"},
          {key:"rework",label:"Rework",count:counts.rework,color:"#3d6b4a",bg:"#4a7c5910",borderC:"#4a7c5925"},
          {key:"rework-conditional",label:"Conditional",count:counts["rework-conditional"],color:"#8a7040",bg:"#C9A96E10",borderC:"#C9A96E30"},
          {key:"diagnose",label:"Diagnose",count:counts.diagnose,color:"#5C564E",bg:"#5C564E08",borderC:"#5C564E20"},
          {key:"diagnose-return",label:"Returns",count:counts["diagnose-return"],color:"#7a6248",bg:"#A68B6B10",borderC:"#A68B6B25"},
          {key:"ship",label:"Ship Ready",count:counts.ship,color:"#2a6b4a",bg:"#2a6b4a10",borderC:"#2a6b4a25"},
        ].map(c => (
          <div key={c.key} onClick={() => setFilter(f => f===c.key?"all":c.key)}
            style={{background: filter===c.key ? c.bg : "#FFFFFF",border:`1.5px solid ${filter===c.key ? c.color : c.borderC}`,
              borderRadius:12,padding:"16px 18px",cursor:"pointer",transition:"all .2s",
              boxShadow: filter===c.key ? `0 2px 12px ${c.color}15` : "0 1px 4px rgba(44,42,37,0.04)"}}>
            <div style={{fontSize:32,fontWeight:700,color:c.color,letterSpacing:"-0.02em"}}>{c.count}</div>
            <div style={{fontSize:12,fontWeight:600,color:c.color,opacity:.75,marginTop:2,letterSpacing:"0.02em"}}>{c.label}</div>
          </div>
        ))}
      </div>

      {/* Filters */}
      <div style={{display:"flex",gap:10,marginBottom:20,flexWrap:"wrap",alignItems:"center"}}>
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search serial, notes, issue…"
          style={{flex:1,minWidth:200,padding:"10px 14px",borderRadius:8,border:"1.5px solid #E8E0D4",background:"#FFFFFF",
            color:"#2C2A25",fontSize:13,fontFamily:"'Raleway',sans-serif",outline:"none",transition:"border .2s"}}
          onFocus={e=>e.target.style.borderColor="#C9A96E"} onBlur={e=>e.target.style.borderColor="#E8E0D4"}/>
        <select value={colourFilter} onChange={e=>setColourFilter(e.target.value)}
          style={{padding:"10px 14px",borderRadius:8,border:"1.5px solid #E8E0D4",background:"#FFFFFF",
            color:"#2C2A25",fontSize:13,fontFamily:"'Raleway',sans-serif",cursor:"pointer"}}>
          <option value="all">All Colours</option>
          <option value="White">White</option>
          <option value="Black">Black</option>
          <option value="Unknown">Unknown</option>
        </select>
        {filter !== "all" && (
          <button onClick={() => setFilter("all")}
            style={{padding:"10px 16px",borderRadius:8,border:"1.5px solid #E8E0D4",background:"#FFFFFF",
              color:"#5C564E",fontSize:12,fontFamily:"'Raleway',sans-serif",fontWeight:600,cursor:"pointer"}}>
            Clear Filter ✕
          </button>
        )}
        <span style={{fontSize:12,color:"#A39B8F",fontWeight:500}}>{filtered.length} of {UNITS.length}</span>
      </div>

      {/* Table */}
      <div style={{borderRadius:14,border:"1.5px solid #E8E0D4",overflow:"hidden",background:"#FFFFFF",
        boxShadow:"0 2px 16px rgba(44,42,37,0.04)"}}>
        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
          <thead>
            <tr style={{background:"#F5F1EB"}}>
              <th style={thStyle}>Serial Number</th>
              <th style={thStyle}>Colour</th>
              <th style={thStyle}>Issue(s)</th>
              <th style={thStyle}>Difficulty</th>
              <th style={{...thStyle,textAlign:"center"}}>Proposed Action</th>
            </tr>
          </thead>
          <tbody>
            {filtered.map((u,i) => {
              const act = overrides[u.sn] || u.action;
              const cfg = ACTION_CONFIG[act];
              const isExpanded = expandedRow === u.sn;
              const isOverridden = overrides[u.sn] && overrides[u.sn] !== u.action;
              return (
                <React.Fragment key={u.sn}>
                  <tr onClick={() => toggleRow(u.sn)}
                    style={{background: isExpanded ? "#FAF8F5" : i%2===0 ? "#FFFFFF" : "#FDFCFB",
                      cursor:"pointer",transition:"background .15s"}}
                    onMouseEnter={e=>{if(!isExpanded)e.currentTarget.style.background="#FAF8F5"}}
                    onMouseLeave={e=>{if(!isExpanded)e.currentTarget.style.background=i%2===0?"#FFFFFF":"#FDFCFB"}}>
                    <td style={tdStyle}>
                      <span style={{fontFamily:"'SF Mono','Courier New',monospace",fontWeight:700,fontSize:13,color:"#2C2A25"}}>{u.sn.slice(-3)}</span>
                      <span style={{color:"#A39B8F",marginLeft:3,fontSize:11,fontFamily:"'SF Mono','Courier New',monospace"}}>{u.sn.slice(5,-3)}</span>
                      {u.returned && <span style={{marginLeft:8,fontSize:10,padding:"2px 6px",borderRadius:4,background:"#A68B6B15",color:"#7a6248",border:"1px solid #A68B6B30",fontWeight:600}}>RTN</span>}
                      {u.prepared && <span style={{marginLeft:8,fontSize:10,padding:"2px 6px",borderRadius:4,background:"#2a6b4a12",color:"#2a6b4a",border:"1px solid #2a6b4a25",fontWeight:600}}>PREP</span>}
                    </td>
                    <td style={tdStyle}>
                      <span style={{display:"inline-flex",alignItems:"center",gap:6}}>
                        <span style={{width:12,height:12,borderRadius:"50%",border:"1.5px solid #E8E0D4",
                          background:u.colour==="White"?"#FFFFFF":u.colour==="Black"?"#2C2A25":"#A39B8F",display:"inline-block",
                          boxShadow:"inset 0 1px 2px rgba(0,0,0,0.08)"}}/>
                        <span style={{color:"#5C564E",fontSize:12,fontWeight:500}}>{u.colour}</span>
                      </span>
                    </td>
                    <td style={tdStyle}>
                      <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                        {u.issues.map((iss,j) => {
                          const isUndiag = iss.includes("Undiagnosed");
                          const isReturn = iss==="Customer Return" || iss==="Odor Issue";
                          const isReady = iss.includes("None");
                          return (
                            <span key={j} style={{fontSize:11,padding:"3px 8px",borderRadius:5,fontWeight:500,
                              background: isUndiag ? "#5C564E0C" : isReturn ? "#A68B6B12" : isReady ? "#2a6b4a10" : "#C17F5E12",
                              color: isUndiag ? "#5C564E" : isReturn ? "#7a6248" : isReady ? "#2a6b4a" : "#9a5030",
                              border:`1px solid ${isUndiag ? "#5C564E18" : isReturn ? "#A68B6B25" : isReady ? "#2a6b4a20" : "#C17F5E25"}`
                            }}>{iss}</span>
                          );
                        })}
                      </div>
                    </td>
                    <td style={tdStyle}>
                      {u.difficulty && (() => {
                        const dc = DIFF_COLORS[u.difficulty] || DIFF_COLORS.Unknown;
                        return <span style={{fontSize:11,padding:"3px 8px",borderRadius:5,fontWeight:600,
                          background:dc.bg,color:dc.text,border:`1px solid ${dc.border}`}}>{u.difficulty}</span>;
                      })()}
                    </td>
                    <td style={{...tdStyle,textAlign:"center"}}>
                      <button onClick={(e) => cycleAction(u.sn, e)}
                        style={{fontSize:11,padding:"6px 12px",borderRadius:7,cursor:"pointer",fontWeight:700,
                          fontFamily:"'Raleway',sans-serif",letterSpacing:"0.01em",
                          background:cfg.bg,color:cfg.text,border:`1.5px solid ${cfg.border}`,
                          boxShadow: isOverridden ? `0 0 0 2px ${cfg.text}25` : "none",
                          transition:"all .15s"}}>
                        {cfg.icon} {cfg.label}
                      </button>
                    </td>
                  </tr>
                  {isExpanded && (
                    <tr style={{background:"#FAF8F5"}}>
                      <td colSpan={5} style={{padding:"16px 24px 20px",borderBottom:"1.5px solid #E8E0D4"}}>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20,fontSize:13}}>
                          <div>
                            <div style={{color:"#CC2D30",marginBottom:6,fontWeight:700,textTransform:"uppercase",fontSize:10,letterSpacing:1.5}}>Recommendation</div>
                            <div style={{color:"#2C2A25",lineHeight:1.7,fontWeight:400}}>{u.fix || "Run PC application test to identify failure mode. Update Machine Counter with results."}</div>
                          </div>
                          <div>
                            <div style={{color:"#A39B8F",marginBottom:6,fontWeight:700,textTransform:"uppercase",fontSize:10,letterSpacing:1.5}}>Details</div>
                            <div style={{color:"#5C564E",lineHeight:1.7}}>{u.notes || "No additional notes"}</div>
                            <div style={{marginTop:10,padding:"8px 12px",borderRadius:6,background:"#F5F1EB",border:"1px solid #E8E0D4",fontSize:11,color:"#A39B8F"}}>
                              Counter ID: <span style={{color:"#5C564E",fontWeight:600}}>P150-{u.id}</span> · Defect: <span style={{color:"#5C564E",fontWeight:600}}>{u.defect?"Yes":"No"}</span> · Returned: <span style={{color:"#5C564E",fontWeight:600}}>{u.returned?"Yes":"No"}</span>
                            </div>
                          </div>
                        </div>
                      </td>
                    </tr>
                  )}
                </React.Fragment>
              );
            })}
          </tbody>
        </table>
      </div>

      {/* Recovery Footer */}
      <div style={{marginTop:28,padding:24,borderRadius:14,border:"1.5px solid #E8E0D4",background:"#FFFFFF",
        boxShadow:"0 2px 16px rgba(44,42,37,0.04)"}}>
        <h3 style={{fontSize:14,fontWeight:700,color:"#2C2A25",marginBottom:14,letterSpacing:"-0.01em"}}>Recovery Estimate</h3>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))",gap:16,fontSize:13}}>
          <div style={{padding:"12px 16px",borderRadius:8,background:"#4a7c590A",border:"1px solid #4a7c5920"}}>
            <div style={{color:"#3d6b4a",fontWeight:700,fontSize:16}}>{counts.rework + counts.ship}</div>
            <div style={{color:"#5C564E",fontSize:11,marginTop:2}}>Recoverable now (low-effort rework + ready)</div>
          </div>
          <div style={{padding:"12px 16px",borderRadius:8,background:"#C9A96E0A",border:"1px solid #C9A96E25"}}>
            <div style={{color:"#8a7040",fontWeight:700,fontSize:16}}>{counts["rework-conditional"]}</div>
            <div style={{color:"#5C564E",fontSize:11,marginTop:2}}>Pending assessment or parts procurement</div>
          </div>
          <div style={{padding:"12px 16px",borderRadius:8,background:"#5C564E08",border:"1px solid #5C564E15"}}>
            <div style={{color:"#5C564E",fontWeight:700,fontSize:16}}>{counts.diagnose + counts["diagnose-return"]}</div>
            <div style={{color:"#5C564E",fontSize:11,marginTop:2}}>Need PC test + physical inspection</div>
          </div>
          <div style={{padding:"12px 16px",borderRadius:8,background:"#991B1E08",border:"1px solid #991B1E18"}}>
            <div style={{color:"#991B1E",fontWeight:700,fontSize:16}}>{counts.scrap}</div>
            <div style={{color:"#5C564E",fontSize:11,marginTop:2}}>Scrap → harvest parts for rework</div>
          </div>
        </div>

        {/* Progress bar */}
        <div style={{marginTop:20,padding:"14px 16px",borderRadius:8,background:"#F5F1EB",border:"1px solid #E8E0D4"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <span style={{fontSize:11,fontWeight:700,color:"#2C2A25",textTransform:"uppercase",letterSpacing:1}}>Best-Case Recovery</span>
            <span style={{fontSize:14,fontWeight:700,color:"#CC2D30"}}>{Math.round((1 - counts.scrap/UNITS.length)*100)}%</span>
          </div>
          <div style={{height:8,borderRadius:4,background:"#E8E0D4",overflow:"hidden",display:"flex"}}>
            <div style={{width:`${(counts.rework+counts.ship)/UNITS.length*100}%`,background:"#4a7c59",transition:"width .4s"}}/>
            <div style={{width:`${counts["rework-conditional"]/UNITS.length*100}%`,background:"#C9A96E",transition:"width .4s"}}/>
            <div style={{width:`${(counts.diagnose+counts["diagnose-return"])/UNITS.length*100}%`,background:"#A39B8F",transition:"width .4s"}}/>
            <div style={{width:`${counts.scrap/UNITS.length*100}%`,background:"#991B1E",transition:"width .4s"}}/>
          </div>
          <div style={{display:"flex",gap:16,marginTop:8,fontSize:10,color:"#A39B8F",fontWeight:500}}>
            <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#4a7c59",marginRight:4,verticalAlign:"middle"}}/>Rework</span>
            <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#C9A96E",marginRight:4,verticalAlign:"middle"}}/>Conditional</span>
            <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#A39B8F",marginRight:4,verticalAlign:"middle"}}/>Diagnose</span>
            <span><span style={{display:"inline-block",width:8,height:8,borderRadius:2,background:"#991B1E",marginRight:4,verticalAlign:"middle"}}/>Scrap</span>
          </div>
        </div>
      </div>

      <div style={{marginTop:20,textAlign:"center",fontSize:11,color:"#A39B8F",padding:8,fontWeight:500}}>
        VCycene Inc. · LILA Pro P150 · Generated {new Date().toLocaleDateString()}
      </div>
    </div>
  );
}

const thStyle = {padding:"12px 16px",textAlign:"left",color:"#5C564E",fontWeight:700,fontSize:10,textTransform:"uppercase",letterSpacing:1.2,borderBottom:"1.5px solid #E8E0D4",fontFamily:"'Raleway',sans-serif"};
const tdStyle = {padding:"12px 16px",borderBottom:"1px solid #F5F1EB",verticalAlign:"middle"};

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
